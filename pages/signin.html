<meta name="viewport" content="width=device-width, initial-scale=1.0"/><style id="page-preload-style">
  html.page-preload body { opacity: 0; }
  body { transition: opacity .12s ease; }
</style>
<script>
  (() => {
    const reveal = () => document.documentElement.classList.remove("page-preload");
    window.addEventListener("DOMContentLoaded", reveal, { once: true });
    window.addEventListener("load", reveal, { once: true });
    setTimeout(reveal, 1200);
  })();
</script>

<body class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col">

    <div class="absolute inset-0 z-0">
      <img alt="High-end gym interior" class="h-full w-full scale-105 object-cover object-center" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9qof-eHqlEdKblzJNFGXxu33PM2cik53ZpBoCngJuKtYYJIh636TdX5hhuN24c9dMq1gT1LGEyfuzM6ZpT-_FgBZnp9IVKgBgMZEZtm_rwn9RbeWQY2RKAweb-ZRMl1RO4e2cHOMzfHZh0FDKWs0cYyNTqeidDUoa63rzeDrybnJOT7M7YmsmTzompf1p-nXnZZvZ1DbBwgOY31NEXxGhAWSot6QRjcM_NtiafNX0aSj_DpJ0ckFgzhakAyaCkv2UNgPYtr3IAM-o"/>
      <div class="editorial-overlay absolute inset-0"></div>
    </div>

    <div class="relative z-10 w-full max-w-xl px-6 py-6 md:py-12">
      <div class="glass-panel flex flex-col gap-8 rounded-xl border border-white/5 p-10 shadow-2xl">
        <header class="space-y-4 text-center">
          <h1 class="font-headline text-3xl font-black tracking-tighter text-primary">THE BIG GYM</h1>
          <div class="space-y-1">
            <p class="font-headline text-2xl font-bold text-on-surface">Tạo tài khoản thành viên</p>
            <p class="text-sm uppercase tracking-wide text-on-surface-variant">Bắt đầu đồng bộ dữ liệu tập luyện với backend</p>
          </div>
        </header>

        <form class="space-y-6" id="register-form">
          <div class="space-y-2">
            <label class="ml-1 text-xs font-bold uppercase tracking-[0.15em] text-on-surface-variant" for="fullname">Họ và tên</label>
            <input class="w-full rounded-lg border-none bg-surface-container-low px-4 py-4 text-on-surface placeholder:text-outline/40 focus:ring-1 focus:ring-primary/50" id="fullname" placeholder="NGUYEN VAN A" required type="text"/>
          </div>

          <div class="space-y-2">
            <label class="ml-1 text-xs font-bold uppercase tracking-[0.15em] text-on-surface-variant" for="email">Email</label>
            <input class="w-full rounded-lg border-none bg-surface-container-low px-4 py-4 text-on-surface placeholder:text-outline/40 focus:ring-1 focus:ring-primary/50" id="email" placeholder="thebiggym@phamductrung.id.vn" required type="email"/>
          </div>

          <div class="space-y-2">
            <label class="ml-1 text-xs font-bold uppercase tracking-[0.15em] text-on-surface-variant" for="phone">Số điện thoại</label>
            <input class="w-full rounded-lg border-none bg-surface-container-low px-4 py-4 text-on-surface placeholder:text-outline/40 focus:ring-1 focus:ring-primary/50" id="phone" placeholder="0900000000" type="tel"/>
          </div>

          <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
            <div class="space-y-2">
              <label class="ml-1 text-xs font-bold uppercase tracking-[0.15em] text-on-surface-variant" for="password">Mật khẩu</label>
              <div class="relative">
                <input class="w-full rounded-lg border-none bg-surface-container-low px-4 py-4 pr-12 text-on-surface placeholder:text-outline/40 focus:ring-1 focus:ring-primary/50" id="password" minlength="6" placeholder="••••••••" required type="password"/>
                <button aria-label="Hiện hoặc ẩn mật khẩu" class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer select-none text-outline" data-password-toggle="password" type="button">visibility</button>
              </div>
            </div>

            <div class="space-y-2">
              <label class="ml-1 text-xs font-bold uppercase tracking-[0.15em] text-on-surface-variant" for="confirm-password">Xác nhận mật khẩu</label>
              <div class="relative">
                <input class="w-full rounded-lg border-none bg-surface-container-low px-4 py-4 pr-12 text-on-surface placeholder:text-outline/40 focus:ring-1 focus:ring-primary/50" id="confirm-password" minlength="6" placeholder="••••••••" required type="password"/>
                <button aria-label="Hiện hoặc ẩn mật khẩu" class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer select-none text-outline" data-password-toggle="confirm-password" type="button">visibility</button>
              </div>
            </div>
          </div>

          <div class="hidden rounded-lg border px-4 py-3 text-sm" id="register-feedback"></div>

          <button class="btn-luxury-gradient w-full rounded-lg py-4 text-sm font-bold uppercase tracking-widest text-on-primary shadow-lg shadow-primary/20 transition-all active:scale-[0.98]" type="submit">

        <div class="space-y-4">
          <div class="flex min-h-[44px] items-center justify-center rounded-lg border border-white/5 bg-surface-container-highest px-3 py-3" id="google-register-button"></div>

            Đã có tài khoản?

  <footer class="absolute bottom-0 z-20 hidden w-full px-12 py-8 md:block">
    <div class="flex items-center justify-between text-[10px] font-medium uppercase tracking-[0.2em] text-outline/60">
      <div>© 2024 THE BIG GYM - HẢI PHÒNG. ALL RIGHTS RESERVED.</div>
      <div class="flex gap-8">
        <a class="transition-colors hover:text-primary" href="../index.html">Về chúng tôi</a>
        <a class="transition-colors hover:text-primary" href="#">Chính sách bảo mật</a>
        <a class="transition-colors hover:text-primary" href="contact.html">Liên hệ</a>
      </div>
    </div>
  </footer>

  <script>
    const apiBaseUrl = window.BIGGYM_API_BASE_URL || (window.location.protocol === "file:" ? "http://localhost:4000/api" : `${window.location.origin}/api`);
    const registerForm = document.getElementById("register-form");
    const registerFeedback = document.getElementById("register-feedback");
    const googleRegisterButton = document.getElementById("google-register-button");
    const googleRegisterNote = document.getElementById("google-register-note");

    try {
      const existingUser = JSON.parse(localStorage.getItem("biggym_user") || "null");
      const existingToken = localStorage.getItem("biggym_token");

      if (existingUser && existingToken) {
        window.location.href = "../index.html";
      }
    } catch (error) {
      localStorage.removeItem("biggym_user");
      localStorage.removeItem("biggym_token");
    }

    function setFeedback(element, type, message) {
      const typeClasses = {
        success: "border-emerald-500/30 bg-emerald-500/10 text-emerald-200",
        error: "border-red-500/30 bg-red-500/10 text-red-200",
        info: "border-primary/30 bg-primary/10 text-primary"
      };

      element.className = `rounded-lg border px-4 py-3 text-sm ${typeClasses[type] || typeClasses.info}`;
      element.textContent = message;
      element.classList.remove("hidden");
    }

    function togglePassword(button) {
      const input = document.getElementById(button.dataset.passwordToggle);
      const isHidden = input.type === "password";

      input.type = isHidden ? "text" : "password";
      button.textContent = isHidden ? "visibility_off" : "visibility";
    }

    function finishAuth(result, successMessage) {
      localStorage.setItem("biggym_token", result.data.token);
      localStorage.setItem("biggym_user", JSON.stringify(result.data.user));
      setFeedback(registerFeedback, "success", successMessage);

      window.setTimeout(() => {
        window.location.href = "../index.html";
      }, 1000);
    }

    async function handleGoogleCredentialResponse(response) {
      try {
        const apiResponse = await fetch(`${apiBaseUrl}/auth/google`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ credential: response.credential })
        });

        const result = await apiResponse.json();

        if (!apiResponse.ok || !result.success) {
          const errorMessage = result.message || result.errors?.[0]?.msg || "Đăng ký Google thất bại.";
          throw new Error(errorMessage);
        }

        finishAuth(result, "Đăng ký bằng Google thành công. Đang chuyển trang...");
      } catch (error) {
        setFeedback(registerFeedback, "error", error.message || "Không thể đăng ký bằng Google.");
      }
    }

    async function initializeGoogleRegister() {
      try {
        const response = await fetch(`${apiBaseUrl}/auth/google-config`);
        const result = await response.json();

        if (!response.ok || !result.success || !result.data?.enabled || !result.data?.clientId) {
          googleRegisterNote.textContent = "Đăng nhập Google chưa được cấu hình trên máy chủ.";
          googleRegisterNote.classList.remove("hidden");
          return;
        }

        if (!window.google?.accounts?.id) {
          googleRegisterNote.textContent = "Google Identity Services chưa tải xong.";
          googleRegisterNote.classList.remove("hidden");
          return;
        }

        window.google.accounts.id.initialize({
          client_id: result.data.clientId,
          callback: handleGoogleCredentialResponse
        });

        window.google.accounts.id.renderButton(googleRegisterButton, {
          theme: "outline",
          size: "large",
          width: googleRegisterButton.offsetWidth || 320,
          text: "signup_with",
          shape: "pill",
          logo_alignment: "left"
        });
      } catch (error) {
        googleRegisterNote.textContent = "Không thể khởi tạo đăng ký Google.";
        googleRegisterNote.classList.remove("hidden");
      }
    }

    async function handleRegister(event) {
      event.preventDefault();

      const submitButton = registerForm.querySelector('button[type="submit"]');
      const full_name = document.getElementById("fullname").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm-password").value;

      registerFeedback.classList.add("hidden");

      if (password !== confirmPassword) {
        setFeedback(registerFeedback, "error", "Mật khẩu xác nhận không khớp.");
        return;
      }

      if (password.length < 6) {
        setFeedback(registerFeedback, "error", "Mật khẩu phải có ít nhất 6 ký tự.");
        return;
      }

      submitButton.disabled = true;
      submitButton.classList.add("opacity-70", "cursor-not-allowed");

      try {
        const response = await fetch(`${apiBaseUrl}/auth/register`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ full_name, email, phone, password })
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
          const errorMessage = result.message || result.errors?.[0]?.msg || "Đăng ký thất bại.";
          throw new Error(errorMessage);
        }

        finishAuth(result, "Tạo tài khoản thành công. Đang chuyển trang...");
      } catch (error) {
        setFeedback(registerFeedback, "error", error.message || "Không thể kết nối tới máy chủ.");
      } finally {
        submitButton.disabled = false;
        submitButton.classList.remove("opacity-70", "cursor-not-allowed");
      }
    }

    document.querySelectorAll("[data-password-toggle]").forEach((button) => {
      button.addEventListener("click", () => togglePassword(button));
    });

    registerForm.addEventListener("submit", handleRegister);
    window.addEventListener("load", initializeGoogleRegister);
  </script>
</body>
